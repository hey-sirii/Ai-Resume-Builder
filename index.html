<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexCV - Resume, Cover Letter & Portfolio Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Main Container -->
    <div class="main-container">

        <!-- Header -->
        <div class="app-header fade-in">
            <h1>Apex CV AI</h1>
            <p>Generate professional resumes, cover letters, and portfolios with AI</p>
        </div>

        <!-- Progress Bar -->
        <div class="progress-section fade-in">
            <div class="progress-header">
                <span class="progress-label" id="step-label">Step 1 of 6: Basic Information</span>
                <span class="progress-percentage" id="step-percentage">16%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar" style="width: 16%"></div>
            </div>
        </div>

        <!-- Form Card -->
        <div class="form-card fade-in">

            <!-- Step 1: Basic Information -->
            <div class="step-content" id="step-1">
                <h2 class="step-title">Basic Information</h2>
                <div class="form-fields">
                    <div>
                        <label class="form-label">Full Name</label>
                        <input type="text" id="name" placeholder="e.g., Jane Doe" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" placeholder="e.g., jane.doe@email.com" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="phone" placeholder="e.g., +1 (555) 123-4567" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">LinkedIn Profile</label>
                        <input type="url" id="linkedin" placeholder="e.g., linkedin.com/in/janedoe" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">GitHub Profile</label>
                        <input type="url" id="github" placeholder="e.g., github.com/janedoe" class="form-input">
                    </div>
                </div>
                <div class="step-nav">
                    <button onclick="nextStep()" class="btn btn-next">Next Step →</button>
                </div>
            </div>

            <!-- Step 2: Education -->
            <div class="step-content hidden" id="step-2">
                <h2 class="step-title">Education</h2>
                <div id="education-container"></div>
                <button onclick="addEducation()" class="btn btn-add">+ Add Education</button>
                <div class="step-nav-between">
                    <button onclick="prevStep()" class="btn btn-back">← Back</button>
                    <button onclick="nextStep()" class="btn btn-next">Next Step →</button>
                </div>
            </div>

            <!-- Step 3: Work Experience -->
            <div class="step-content hidden" id="step-3">
                <h2 class="step-title">Work Experience</h2>
                <div id="experience-container"></div>
                <button onclick="addExperience()" class="btn btn-add">+ Add Experience</button>
                <div class="step-nav-between">
                    <button onclick="prevStep()" class="btn btn-back">← Back</button>
                    <button onclick="nextStep()" class="btn btn-next">Next Step →</button>
                </div>
            </div>

            <!-- Step 4: Projects -->
            <div class="step-content hidden" id="step-4">
                <h2 class="step-title">Projects</h2>
                <div id="projects-container"></div>
                <button onclick="addProject()" class="btn btn-add">+ Add Project</button>
                <div class="step-nav-between">
                    <button onclick="prevStep()" class="btn btn-back">← Back</button>
                    <button onclick="nextStep()" class="btn btn-next">Next Step →</button>
                </div>
            </div>

            <!-- Step 5: Skills -->
            <div class="step-content hidden" id="step-5">
                <h2 class="step-title">Skills</h2>
                <div>
                    <label class="form-label">Enter your skills (comma-separated)</label>
                    <textarea id="skills" rows="6"
                        placeholder="e.g., Python, JavaScript, React, Node.js, SQL, Machine Learning, Public Speaking, Project Management"
                        class="form-textarea"></textarea>
                </div>
                <div class="step-nav-between">
                    <button onclick="prevStep()" class="btn btn-back">← Back</button>
                    <button onclick="nextStep()" class="btn btn-next">Next Step →</button>
                </div>
            </div>

            <!-- Step 6: Generation Hub -->
            <div class="step-content hidden" id="step-6">
                <h2 class="step-title">Generation Hub</h2>
                <div class="job-desc-section">
                    <label class="form-label">Target Job Description (Optional but Recommended)</label>
                    <textarea id="job-description" rows="8"
                        placeholder="Paste the job description here to tailor your resume and cover letter..."
                        class="form-textarea"></textarea>
                </div>
                <div class="gen-hub-grid">
                    <button onclick="generateContent('resume')" class="gen-hub-card">
                        <div class="icon">📄</div>
                        <div class="label">Generate Resume</div>
                    </button>
                    <button onclick="generateContent('cover-letter')" class="gen-hub-card">
                        <div class="icon">✉️</div>
                        <div class="label">Generate Cover Letter</div>
                    </button>
                    <button onclick="generateContent('portfolio')" class="gen-hub-card">
                        <div class="icon">🌐</div>
                        <div class="label">Generate Portfolio</div>
                    </button>
                </div>
                <div class="step-nav-start">
                    <button onclick="prevStep()" class="btn btn-back">← Back</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div id="loading-modal" class="modal-overlay">
        <div class="modal-box" style="text-align: center;">
            <div class="loading-spinner"></div>
            <div class="loading-text">
                <h3>Generating with AI...</h3>
                <p>This may take a few moments</p>
            </div>
        </div>
    </div>

    <!-- Output Modal -->
    <div id="output-modal" class="modal-overlay">
        <div class="modal-box-large">
            <div class="modal-header">
                <h3 id="output-title">Generated Content</h3>
            </div>
            <div class="modal-body">
                <div id="output-content" class="output-content"></div>
            </div>
            <div class="modal-footer">
                <button onclick="closeOutputModal()" class="btn btn-cancel">Close</button>
                <button onclick="copyToClipboard()" class="btn btn-copy">Copy to Clipboard</button>
                <button onclick="saveAsFile()" class="btn btn-download">Save as File</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
